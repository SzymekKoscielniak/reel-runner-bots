<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Turniej Botów</title>
<!-- ===========================================================
     ✅ WERSJA 3 — STRUKTURA 88 → 40 → 32
     index.html dla repo reel-runner-bots (obok Boty.png), GitHub Pages.

     CO ZMIENIONE W TEJ WERSJI:
       • FAZA 1 — Redukcja 88 → 40: losowe pary (44 pojedynki),
         odpada 4 zwycięzców z najsłabszym marginesem wygranej.
       • FAZA 2 — Grupy: 4 grupy po 10, każdy bot gra 4 mecze
         z LOSOWO dobranymi przeciwnikami (nie każdy z każdym),
         pary różne, bez powtórek. ~80 meczów. Tabele grup na żywo.
       • FAZA 3 — Playoffy: top 32 globalnie wg punktów, losowanie
         z rozstawieniem 1 vs 32, drabinka live do finału.
       • Sterowanie klawiaturą 1 / 2 / Enter we wszystkich fazach.
       • Naprawiona składnia (Unexpected token) — funkcja el() bez
         domyślnego parametru przed rest-argumentem.

     UWAGA: podgląd w Claude pokaże błąd/pustkę — to normalne,
     plik HTML działa dopiero na GitHub Pages (Boty.png z tej samej domeny).
     =========================================================== -->
<style>
  :root{
    --bg:#e8f5e2; --primary:#3db858; --light:#7ee890; --sky:#58c8ff;
    --gold:#f5c518; --text:#1a6b2e; --panel:#ffffff; --bad:#e8794a;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);font-family:system-ui,sans-serif;color:var(--text);padding:16px}
  h1{text-align:center;margin:8px 0 2px}
  .sub{text-align:center;color:var(--primary);font-weight:600;margin:0 0 14px}
  .panel{background:var(--panel);border-radius:18px;padding:20px;max-width:820px;margin:0 auto 16px;box-shadow:0 8px 24px rgba(0,0,0,.08)}
  .cellimg{image-rendering:pixelated;border-radius:14px;border:3px solid #fff;box-shadow:0 4px 12px rgba(0,0,0,.15)}
  .arena{display:flex;justify-content:space-around;align-items:center;margin-bottom:24px;gap:10px}
  .fighter{display:flex;flex-direction:column;align-items:center;transition:opacity .2s}
  .fighter .name{margin-top:8px;font-weight:700;font-size:14px}
  .vs{font-size:26px;font-weight:900;color:var(--gold)}
  .dim{opacity:.4}
  input[type=range]{width:100%;accent-color:var(--primary);height:8px}
  .btn{width:100%;margin-top:18px;padding:14px;border:none;border-radius:12px;background:var(--primary);color:#fff;font-weight:800;font-size:16px;cursor:pointer}
  .btn.sky{background:var(--sky)}
  .hint{text-align:center;font-size:12px;margin-top:10px;font-weight:600}
  .row{display:flex;align-items:center;justify-content:space-between;padding:7px 10px;border-radius:8px;margin-bottom:4px}
  .pill{display:flex;align-items:center;gap:6px;padding:4px 7px;border-radius:8px;background:#f3faf0;font-size:11px;font-weight:600;white-space:nowrap}
  .bracket{display:flex;gap:14px;overflow-x:auto;padding-bottom:10px}
  .bcol{display:flex;flex-direction:column;gap:10px;min-width:150px;justify-content:space-around}
  .bmatch{border:2px solid #e0eed8;border-radius:10px;padding:5px;background:#fff;display:flex;flex-direction:column;gap:3px}
  .bmatch.cur{border-color:var(--gold);background:#fffbe8}
  .ctrls{display:flex;gap:18px;flex-wrap:wrap;margin-bottom:14px}
  label.ctrl{display:flex;flex-direction:column;font-size:12px;font-weight:700;gap:4px}
  canvas#cal{width:100%;border:2px solid #e0eed8;border-radius:8px;image-rendering:pixelated}
  .err{color:#c0392b;font-weight:700}
  .seedgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .seedrow{display:flex;align-items:center;gap:6px;padding:6px;border:2px solid #e0eed8;border-radius:10px}
  .thumb{image-rendering:pixelated;border-radius:6px;border:2px solid #fff;flex-shrink:0}
  .tablewrap{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .progress{text-align:center;font-size:12px;color:var(--text);font-weight:600;margin-bottom:8px}
  @media(max-width:680px){.tablewrap{grid-template-columns:1fr}}
</style>

<div id="app"></div>

<script>
// ===== KONFIG =====
const SHEET = "Boty.png";
let COLS=8, ROWS=11, GAP=0, PAD=0;
const TOTAL = COLS*ROWS;        // 88
const AFTER_REDUCTION = 40;     // ilu zostaje po fazie 1
const GROUP_COUNT = 4;          // 4 grupy
const GROUP_SIZE = 10;          // po 10 = 40
const MATCHES_PER_BOT = 4;      // mecze na bota w grupie
const ADVANCE = 32;             // finałowa 32

const app = document.getElementById("app");
let img=null, cellW=0, cellH=0;

// stan
let chars=[], slider=50, phase="loading";
// faza 1 (redukcja)
let redMatches=[], redIdx=0, redWins=[]; // redWins: {char, margin}
// faza 2 (grupy)
let groups=[], groupMatches=[], gIdx=0, points={}, botGroup={};
// faza 3 (playoff)
let seeded=[], bracket=[], poR=0, poM=0, champ=null;

// ===== ŁADOWANIE =====
img = new Image();
img.onload = () => { phase="calibrate"; recalcCells(); render(); };
img.onerror = () => { phase="error"; render(); };
img.src = SHEET;

function recalcCells(){
  cellW=(img.naturalWidth-2*PAD-(COLS-1)*GAP)/COLS;
  cellH=(img.naturalHeight-2*PAD-(ROWS-1)*GAP)/ROWS;
}
function cellXY(i){ const c=i%COLS, r=Math.floor(i/COLS); return {x:PAD+c*(cellW+GAP), y:PAD+r*(cellH+GAP)}; }
function makeBotCanvas(i,size){
  const cv=document.createElement("canvas"); cv.width=size; cv.height=size; cv.className="cellimg";
  cv.style.width=size+"px"; cv.style.height=size+"px";
  const ctx=cv.getContext("2d"); ctx.imageSmoothingEnabled=false;
  const {x,y}=cellXY(i); ctx.drawImage(img,x,y,cellW,cellH,0,0,size,size); return cv;
}
function botThumb(i,size){ const cv=makeBotCanvas(i,size); cv.className="thumb"; cv.style.width=size+"px"; cv.style.height=size+"px"; return cv; }

function shuffle(a){ a=[...a]; for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }

// ===== FAZA 1: REDUKCJA 88 -> 40 =====
function initReduction(){
  chars=Array.from({length:TOTAL},(_,i)=>({id:i,name:"Bot "+(i+1)}));
  const sh=shuffle(chars);
  redMatches=[];
  for(let i=0;i+1<sh.length;i+=2) redMatches.push({a:sh[i],b:sh[i+1]});
  // jeśli nieparzyście – ostatni dostaje wolny los (awansuje za darmo)
  let bye=null;
  if(sh.length%2===1) bye=sh[sh.length-1];
  redIdx=0; redWins=[]; slider=50;
  if(bye) redWins.push({char:bye, margin:0.5}); // wolny los: neutralny margines
}
function submitReduction(){
  const m=redMatches[redIdx];
  // siła zwycięstwa: margines = jak daleko od środka
  const winner = slider<=50 ? m.a : m.b;
  const margin = Math.abs(slider-50)/50; // 0..1
  redWins.push({char:winner, margin});
  slider=50;
  if(redIdx+1<redMatches.length){ redIdx++; render(); }
  else finishReduction();
}
function finishReduction(){
  // 44 zwycięzców -> odrzuć 4 z najniższym marginesem -> 40
  const sorted=[...redWins].sort((a,b)=>b.margin-a.margin);
  const survivors=sorted.slice(0,AFTER_REDUCTION).map(w=>w.char);
  initGroups(survivors);
  phase="group"; render();
}

// ===== FAZA 2: GRUPY =====
function initGroups(survivors){
  const sh=shuffle(survivors);
  groups=Array.from({length:GROUP_COUNT},()=>[]);
  sh.forEach((c,i)=>{ const g=i%GROUP_COUNT; groups[g].push(c); botGroup[c.id]=g; });
  points={}; sh.forEach(c=>points[c.id]=0);
  // harmonogram: każdy bot ma grać MATCHES_PER_BOT meczów wewnątrz grupy, pary losowe bez powtórek
  groupMatches=[];
  groups.forEach((g,gi)=>{
    const need={}; g.forEach(c=>need[c.id]=MATCHES_PER_BOT);
    // wszystkie możliwe pary w grupie
    let pool=[];
    for(let i=0;i<g.length;i++) for(let j=i+1;j<g.length;j++) pool.push([g[i],g[j]]);
    pool=shuffle(pool);
    // zachłannie dobieraj pary aż każdy osiągnie limit
    const used=new Set();
    let progress=true;
    while(progress){
      progress=false;
      for(const [a,b] of pool){
        const key=a.id+"-"+b.id;
        if(used.has(key)) continue;
        if(need[a.id]>0 && need[b.id]>0){
          groupMatches.push({gi,a,b}); used.add(key);
          need[a.id]--; need[b.id]--; progress=true;
        }
      }
    }
  });
  groupMatches=shuffle(groupMatches);
  gIdx=0; slider=50;
}
function submitGroup(){
  const m=groupMatches[gIdx];
  points[m.a.id]+=(100-slider)/100;
  points[m.b.id]+=slider/100;
  slider=50;
  if(gIdx+1<groupMatches.length){ gIdx++; render(); }
  else prepareDraw();
}
function advancingSet(){
  const ranked=[...allGroupChars()].sort((a,b)=>points[b.id]-points[a.id]);
  return new Set(ranked.slice(0,ADVANCE).map(c=>c.id));
}
function allGroupChars(){ return groups.flat(); }

// ===== FAZA 3: PLAYOFF =====
function prepareDraw(){
  const ranked=[...allGroupChars()].sort((a,b)=>points[b.id]-points[a.id]);
  seeded=ranked.slice(0,ADVANCE);
  phase="draw"; render();
}
function startPlayoffs(){
  const r1=[]; for(let i=0;i<seeded.length/2;i++) r1.push([seeded[i],seeded[seeded.length-1-i]]);
  bracket=[r1]; poR=0; poM=0; slider=50; phase="playoff"; render();
}
function submitPlayoff(){
  const round=bracket[poR]; const [a,b]=round[poM];
  const w=slider<=50?a:b; round[poM]=[a,b,w.id];
  if(poM+1<round.length){ poM++; slider=50; render(); }
  else{
    const winners=round.map(([x,y,wid])=>wid===x.id?x:y);
    if(winners.length===1){ champ=winners[0]; phase="done"; render(); }
    else{ const next=[]; for(let i=0;i<winners.length;i+=2) next.push([winners[i],winners[i+1]]);
      bracket.push(next); poR++; poM=0; slider=50; render(); }
  }
}
function resetAll(){ initReduction(); phase="reduction"; render(); }
const roundName=n=>n===16?"1/16":n===8?"1/8":n===4?"Ćwierćfinał":n===2?"Półfinał":n===1?"FINAŁ":"Runda ("+n+")";

// ===== KLAWIATURA =====
document.addEventListener("keydown",e=>{
  if(phase==="reduction"){
    if(e.key==="1"){slider=0;render();} else if(e.key==="2"){slider=100;render();} else if(e.key==="Enter") submitReduction();
  } else if(phase==="group"){
    if(e.key==="1"){slider=0;render();} else if(e.key==="2"){slider=100;render();} else if(e.key==="Enter") submitGroup();
  } else if(phase==="playoff"){
    if(e.key==="1"){slider=0;render();} else if(e.key==="2"){slider=100;render();} else if(e.key==="Enter") submitPlayoff();
  }
});

// ===== HELPERY DOM =====
function el(tag,props,...kids){
  props=props||{};
  var e=document.createElement(tag);
  for(var k in props){
    if(k==="style") e.style.cssText=props[k];
    else if(k.indexOf("on")===0) e[k.toLowerCase()]=props[k];
    else if(k==="class") e.className=props[k];
    else e.setAttribute(k,props[k]);
  }
  kids.flat().forEach(function(c){ if(c==null) return; e.append(c.nodeType?c:document.createTextNode(c)); });
  return e;
}
function fighterEl(char,size,dim){
  const w=el("div",{class:"fighter"+(dim?" dim":"")});
  w.append(makeBotCanvas(char.id,size)); w.append(el("div",{class:"name"},char.name)); return w;
}
function pill(char,o={}){
  const p=el("div",{class:"pill",style:`${o.cur?"background:var(--light);border:2px solid var(--primary);":""}${o.loser?"opacity:.4;":""}${o.winner?"font-weight:800;":""}`});
  p.append(botThumb(char.id,18)); p.append(char.name); return p;
}
function arena(a,b,label,submitFn){
  const p=el("div",{class:"panel"});
  p.append(el("div",{style:"text-align:center;font-weight:600;margin-bottom:14px"},label));
  const ar=el("div",{class:"arena"});
  ar.append(fighterEl(a,120,slider>50)); ar.append(el("div",{class:"vs"},"VS")); ar.append(fighterEl(b,120,slider<50));
  p.append(ar);
  p.append(el("input",{type:"range",min:0,max:100,value:slider,oninput:e=>{slider=+e.target.value;updateLive();}}));
  p.append(el("div",{style:"display:flex;justify-content:space-between;font-size:13px;margin-top:6px;font-weight:600"},
    el("span",{},`← ${a.name} (${100-slider}%)`), el("span",{},`${b.name} (${slider}%) →`)));
  p.append(el("button",{class:"btn",onClick:submitFn},"Zatwierdź →"));
  return p;
}
function updateLive(){ const ar=document.querySelector(".arena"); if(ar){const f=ar.querySelectorAll(".fighter");
  f[0].classList.toggle("dim",slider>50); f[1].classList.toggle("dim",slider<50);} }

function groupTableEl(gi){
  const p=el("div",{style:"background:#fff;border-radius:14px;padding:14px"});
  p.append(el("div",{style:"display:flex;justify-content:space-between;margin-bottom:8px"},
    el("div",{style:"font-weight:800"},"Grupa "+String.fromCharCode(65+gi)),
    el("div",{style:"font-size:10px;color:var(--primary);font-weight:600"},"awans=top "+ADVANCE)));
  const adv=advancingSet();
  [...groups[gi]].sort((a,b)=>points[b.id]-points[a.id]).forEach((c,i)=>{
    const ok=adv.has(c.id);
    const r=el("div",{class:"row",style:`background:${ok?"#e9f9ec":"#faf0f0"};border-left:4px solid ${ok?"var(--primary)":"var(--bad)"};padding:4px 7px`});
    r.append(el("div",{style:"display:flex;align-items:center;gap:6px"},
      el("span",{style:"width:16px;text-align:right;color:var(--primary);font-weight:800;font-size:11px"},(i+1)+"."),
      botThumb(c.id,18), el("span",{style:"font-weight:600;font-size:12px"},c.name)));
    r.append(el("div",{style:"display:flex;align-items:center;gap:6px"},
      el("span",{style:`font-size:10px;font-weight:800;color:${ok?"var(--primary)":"var(--bad)"}`},ok?"✓":"✗"),
      el("span",{style:"font-weight:800;color:var(--gold);font-size:12px;min-width:42px;text-align:right"},points[c.id].toFixed(1))));
    p.append(r);
  });
  return p;
}
function bracketView(){
  const wrap=el("div",{class:"bracket"});
  bracket.forEach((round,ri)=>{
    const col=el("div",{class:"bcol"});
    col.append(el("div",{style:"text-align:center;font-weight:800;color:var(--primary);font-size:13px"},roundName(round.length)));
    round.forEach((pair,mi)=>{ const [a,b,wid]=pair; const cur=ri===poR&&mi===poM&&phase==="playoff";
      const m=el("div",{class:"bmatch"+(cur?" cur":"")});
      m.append(pill(a,{winner:wid===a.id,loser:wid!=null&&wid!==a.id,cur}));
      m.append(pill(b,{winner:wid===b.id,loser:wid!=null&&wid!==b.id,cur}));
      col.append(m); });
    wrap.append(col);
  });
  return wrap;
}

// ===== RENDER =====
function render(){
  app.innerHTML="";
  if(phase==="loading"){ app.append(el("div",{class:"panel"},"Ładuję arkusz…")); return; }
  if(phase==="error"){ app.append(el("h1",{},"Błąd"));
    app.append(el("div",{class:"panel err"},`Nie udało się załadować "${SHEET}". Upewnij się, że plik leży obok index.html i otwierasz stronę przez GitHub Pages.`)); return; }

  if(phase==="calibrate"){
    app.append(el("h1",{},"Kalibracja siatki"));
    app.append(el("p",{class:"sub"},"Sprawdź, czy różowa siatka trafia w każdego bota, potem Start."));
    const p=el("div",{class:"panel"}); const ctrls=el("div",{class:"ctrls"});
    const mk=(lab,val,min,max,set)=>{ const l=el("label",{class:"ctrl"},`${lab}: ${val}`);
      l.append(el("input",{type:"range",min,max,value:val,oninput:e=>{set(+e.target.value);recalcCells();drawCal();l.firstChild.textContent=`${lab}: ${e.target.value}`;}})); return l; };
    ctrls.append(mk("Kolumny",COLS,1,16,v=>COLS=v),mk("Wiersze",ROWS,1,16,v=>ROWS=v),mk("Odstęp",GAP,0,60,v=>GAP=v),mk("Margines",PAD,0,60,v=>PAD=v));
    p.append(ctrls); p.append(el("div",{id:"caldim",style:"font-size:13px;font-weight:600;margin-bottom:10px"}));
    p.append(el("canvas",{id:"cal"}));
    p.append(el("button",{class:"btn sky",onClick:()=>{ initReduction(); phase="reduction"; render(); }},"Siatka OK — Start turnieju →"));
    app.append(p); drawCal(); return;
  }

  if(phase==="reduction"){
    const m=redMatches[redIdx];
    app.append(el("h1",{},"Faza 1 — Redukcja"));
    app.append(el("p",{class:"sub"},`Pojedynek ${redIdx+1} / ${redMatches.length} • zostanie ${AFTER_REDUCTION} z ${TOTAL}`));
    app.append(arena(m.a,m.b,"Wybierz zwycięzcę — jak pewnie wygrał (suwak przy krawędzi = miażdżąco)",submitReduction));
    app.append(el("div",{class:"hint"},`⌨️ 1 = ${m.a.name} • 2 = ${m.b.name} • Enter = zatwierdź`));
    app.append(el("div",{class:"panel",style:"font-size:13px"},
      el("b",{},"Zasada redukcji: "),`88 botów gra w parach → 44 zwycięzców. Z nich odpadają 4 z najsłabszym marginesem zwycięstwa, zostaje ${AFTER_REDUCTION}.`));
    return;
  }

  if(phase==="group"){
    const m=groupMatches[gIdx];
    app.append(el("h1",{},"Faza 2 — Grupy"));
    app.append(el("p",{class:"sub"},`Grupa ${String.fromCharCode(65+m.gi)} • Mecz ${gIdx+1} / ${groupMatches.length}`));
    app.append(arena(m.a,m.b,"Wybierz zwycięzcę (suwak = remis na środku)",submitGroup));
    app.append(el("div",{class:"hint"},`⌨️ 1 = ${m.a.name} • 2 = ${m.b.name} • Enter = zatwierdź`));
    const tp=el("div",{class:"panel"});
    tp.append(el("div",{style:"font-weight:800;margin-bottom:10px"},"Tabele grup (na żywo)"));
    const grid=el("div",{class:"tablewrap"});
    for(let gi=0;gi<GROUP_COUNT;gi++) grid.append(groupTableEl(gi));
    tp.append(grid); app.append(tp);
    return;
  }

  if(phase==="draw"){
    app.append(el("h1",{},"🎲 Losowanie"));
    app.append(el("p",{class:"sub"},`Awansowało ${ADVANCE}. Rozstawienie 1 vs ${ADVANCE}, 2 vs ${ADVANCE-1}…`));
    const p=el("div",{class:"panel"}); const grid=el("div",{class:"seedgrid"});
    for(let i=0;i<seeded.length/2;i++){ const a=seeded[i], b=seeded[seeded.length-1-i];
      grid.append(el("div",{class:"seedrow"},el("span",{style:"color:var(--primary);font-weight:800;font-size:11px;width:16px"},i+1),
        pill(a),el("span",{style:"color:var(--gold);font-weight:800;font-size:11px"},"vs"),pill(b))); }
    p.append(grid); p.append(el("button",{class:"btn sky",onClick:startPlayoffs},"Rozpocznij playoffy →")); app.append(p);
    return;
  }

  if(phase==="playoff"){
    const round=bracket[poR]; const [a,b]=round[poM];
    app.append(el("h1",{},"Faza 3 — Playoffy"));
    app.append(el("p",{class:"sub"},`${roundName(round.length)} • Pojedynek ${poM+1} / ${round.length}`));
    app.append(arena(a,b,"Wybierz, kto awansuje",submitPlayoff));
    app.append(el("div",{class:"hint"},`⌨️ 1 = ${a.name} • 2 = ${b.name} • Enter = zatwierdź`));
    const bp=el("div",{class:"panel"}); bp.append(el("div",{style:"font-weight:800;margin-bottom:12px"},"Drabinka"));
    bp.append(bracketView()); app.append(bp);
    return;
  }

  if(phase==="done"){
    app.append(el("h1",{},"🏆 Zwycięzca 🏆"));
    const p=el("div",{class:"panel",style:"text-align:center"});
    p.append(fighterEl(champ,160,false));
    p.append(el("button",{class:"btn sky",style:"max-width:240px;margin:20px auto 0",onClick:resetAll},"Zagraj ponownie"));
    app.append(p); return;
  }
}
function drawCal(){
  const cv=document.getElementById("cal"); if(!cv) return;
  const maxW=780, scale=Math.min(1,maxW/img.naturalWidth);
  cv.width=img.naturalWidth*scale; cv.height=img.naturalHeight*scale;
  const ctx=cv.getContext("2d"); ctx.imageSmoothingEnabled=false;
  ctx.drawImage(img,0,0,cv.width,cv.height);
  ctx.strokeStyle="#ff2d7a"; ctx.lineWidth=1.5; ctx.fillStyle="#ff2d7a"; ctx.font="bold 12px sans-serif";
  for(let i=0;i<COLS*ROWS;i++){ const {x,y}=cellXY(i);
    ctx.strokeRect(x*scale,y*scale,cellW*scale,cellH*scale); ctx.fillText(i+1,x*scale+3,y*scale+13); }
  const d=document.getElementById("caldim");
  if(d) d.textContent=`Plik: ${img.naturalWidth}×${img.naturalHeight}px • komórek: ${COLS*ROWS} • komórka ≈ ${Math.round(cellW)}×${Math.round(cellH)}px`;
}
render();
</script>
